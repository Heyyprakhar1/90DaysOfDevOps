kind: Deployment
apiVersion: apps/v1

metadata:
  name: app-deployment
  namespace: app-ns
  labels:
    app: web-app

spec:
  replicas: 3
  selector:
    matchLabels:
      app: web-app

  template:
    metadata:
      labels:
        app: web-app
    
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80

